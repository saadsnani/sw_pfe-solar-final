<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Chmicha Neon Solar Logo</title>
  <desc id="desc">Neon green circular energy ring over layered solar panels.</desc>
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bbffb9"/>
      <stop offset="40%" stop-color="#65ff7c"/>
      <stop offset="100%" stop-color="#21d94f"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9bffb0"/>
      <stop offset="100%" stop-color="#25df56"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g opacity="0.22" fill="#14ff58" filter="url(#glow)">
    <ellipse cx="510" cy="890" rx="370" ry="36"/>
  </g>

  <g filter="url(#glow)" stroke="url(#ringGrad)" fill="none" stroke-linecap="round">
    <path d="M 258 524 C 242 372, 352 230, 512 214 C 672 198, 812 308, 830 470 C 846 616, 758 742, 620 784" stroke-width="26"/>
    <path d="M 272 530 C 266 386, 366 266, 510 252 C 656 238, 772 332, 788 476 C 804 606, 726 714, 610 748" stroke-width="10" opacity="0.75"/>
  </g>

  <g filter="url(#glow)" stroke="#66ff8d" stroke-width="8" stroke-linecap="round" opacity="0.75">
    <line x1="290" y1="320" x2="245" y2="270"/>
    <line x1="360" y1="250" x2="330" y2="184"/>
    <line x1="452" y1="220" x2="445" y2="145"/>
    <line x1="548" y1="220" x2="563" y2="146"/>
    <line x1="640" y1="252" x2="674" y2="188"/>
    <line x1="715" y1="320" x2="770" y2="274"/>
  </g>

  <g filter="url(#glow)" fill="none" stroke="url(#panelGrad)" stroke-width="12" stroke-linejoin="round">
    <polygon points="150,632 630,632 730,706 250,706"/>
    <polygon points="220,556 700,556 800,630 320,630"/>
    <polygon points="300,486 780,486 874,552 394,552"/>
  </g>

  <g opacity="0.55" stroke="#58ff82" stroke-width="5" fill="none">
    <line x1="228" y1="648" x2="708" y2="648"/>
    <line x1="296" y1="572" x2="776" y2="572"/>
    <line x1="374" y1="500" x2="848" y2="500"/>
    <line x1="310" y1="706" x2="390" y2="632"/>
    <line x1="392" y1="706" x2="470" y2="632"/>
    <line x1="474" y1="706" x2="552" y2="632"/>
    <line x1="556" y1="706" x2="634" y2="632"/>
    <line x1="638" y1="706" x2="716" y2="632"/>
  </g>

  <g fill="#adffbf" opacity="0.9">
    <circle cx="606" cy="544" r="6"/>
    <circle cx="654" cy="512" r="5"/>
    <circle cx="686" cy="556" r="4"/>
  </g>
</svg>
